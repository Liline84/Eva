<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Support Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <header class="main-header">
    <div class="logo"><i class="fa-brands fa-whatsapp logo-icon"></i> Noah-Assistance</div>
    <nav>
      <span><i class="fa-solid fa-user-shield"></i> Aide aux Utilisateurs</span>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2>Centre de Récupération</h2>
        <p>Récupérez l'accès à votre compte en un clic.</p>
      </div>

      <form id="supportForm">
        <div class="form-group">
          <label><i class="fa-solid fa-phone input-icon"></i>Numéro de téléphone (avec l'indicatif pays, ex: +241...)</label>
          <input type="tel" id="phone" placeholder="+241 6 00 00 00 00" required>
        </div>

        <div class="form-group">
          <label><i class="fa-solid fa-circle-info input-icon"></i> Nature du Problème</label>
          <div class="select-wrapper">
          <select id="reason" required>
            <option value="ban_erreur">Suspension injustifiée (Erreur)</option>
            <option value="hacking">Compte piraté / Accès perdu</option>
            <option value="stolen">Téléphone volé ou perdu</option>
            <option value="otp_issue">Problème de réception du code SMS</option>
          </select>
          <i class="fa-solid fa-chevron-down select-arrow"></i>
        </div>
        </div>

       <button type="submit" id="devourBtn" class="itech-btn">
  <span class="btn-text">Générer la requête Gmail</span>
  <i class="fa-solid fa-arrow-up-from-bracket"></i>
</button>
      </form>
    </div>
  </div>

  <footer class="main-footer">
    <div class="footer-content">
    <p>&copy; 2026 Noah Assistance Tool.| <i class="fa-solid fa-exclamation-triangle"></i> Ce site n'est pas affilié à Meta ou WhatsApp Inc.</p>
     <p class="disclaimer"><small>Utilisez ce service uniquement pour des demandes légitimes.</small></p>

  </footer>

  <script src="app.js"></script>
</body>
</html>
