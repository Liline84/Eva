<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Support Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="main-header">
    <div class="logo">WA-Assistance</div>
    <nav>
      <span>Aide aux Utilisateurs</span>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2>Centre de Récupération</h2>
        <p>Récupérez l'accès à votre compte en un clic.</p>
      </div>

      <form id="supportForm">
        <div class="form-group">
          <label>Votre Numéro de Téléphone</label>
          <input type="tel" id="phone" placeholder="+33 6 00 00 00 00" required>
        </div>

        <div class="form-group">
          <label>Nature du Problème</label>
          <select id="reason" required>
            <option value="ban_erreur">Suspension injustifiée (Erreur)</option>
            <option value="hacking">Compte piraté / Accès perdu</option>
            <option value="stolen">Téléphone volé ou perdu</option>
            <option value="otp_issue">Problème de réception du code SMS</option>
          </select>
        </div>

        <button type="submit" id="devourBtn">Générer la requête Gmail</button>
      </form>
    </div>
  </div>

  <footer class="main-footer">
    <p>&copy; 2026 WhatsApp Assistance Tool. Ce site n'est pas affilié à Meta ou WhatsApp Inc.</p>
    <p><small>Utilisez ce service uniquement pour des demandes légitimes.</small></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
